    <title>Supervizio</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a0f;
        color: #f1f5f9;
        font-family:
          Inter,
          -apple-system,
          system-ui,
          sans-serif;
        overflow: hidden;
      }
      .container {
        text-align: center;
        padding: 2rem;
        max-width: 480px;
      }
      .logo {
        width: 80px;
        height: auto;
        margin-bottom: 2rem;
        opacity: 0.9;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 0.75rem;
        letter-spacing: -0.02em;
      }
      .accent {
        background: linear-gradient(135deg, #fff 0%, #c7d2fe 45%, #6366f1 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      p {
        color: #64748b;
        font-size: 0.95rem;
        line-height: 1.6;
        margin-bottom: 1.5rem;
      }
      .divider {
        width: 48px;
        height: 2px;
        background: linear-gradient(90deg, transparent, #6366f1, transparent);
        margin: 0 auto 1.5rem;
        border-radius: 1px;
      }
      .contact {
        color: #94a3b8;
        font-size: 0.8rem;
      }
      .contact a {
        color: #818cf8;
        text-decoration: none;
      }
      .contact a:hover {
        text-decoration: underline;
      }
      .glow {
        position: fixed;
        width: 300px;
        height: 300px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(99, 102, 241, 0.08),
          transparent 70%
        );
        pointer-events: none;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
    </style>
  </head>
