<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Supervizio</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a0f;
        color: #f1f5f9;
        font-family: system-ui, sans-serif;
      }
      div {
        text-align: center;
        padding: 2rem;
        max-width: 480px;
      }
      .m {
        width: 56px;
        height: 56px;
        margin: 0 auto 1.5rem;
        border-radius: 14px;
        background: linear-gradient(135deg, #6366f1, #4f46e5);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        font-weight: 700;
        color: #fff;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 0.75rem;
        color: #e2e8f0;
      }
      .d {
        width: 48px;
        height: 2px;
        background: linear-gradient(90deg, transparent, #6366f1, transparent);
        margin: 0 auto 1.5rem;
      }
      p {
        color: #64748b;
        font-size: 0.95rem;
        line-height: 1.6;
        margin-bottom: 1.5rem;
      }
      .c {
        color: #94a3b8;
        font-size: 0.8rem;
      }
      .c a {
        color: #818cf8;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div>
      <div class="m">S</div>
      <h1>Supervizio</h1>
      <div class="d"></div>
      <p>
        Real-time infrastructure monitoring.<br />We're preparing something
        great.
      </p>
      <div class="c">
        Contact us at
        <a href="mailto:contact@superviz.io">contact@superviz.io</a>
      </div>
    </div>
  </body>
</html>
